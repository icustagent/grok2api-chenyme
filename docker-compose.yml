services:
  grok2api:
    container_name: grok2api
    image: ghcr.io/chenyme/grok2api:latest
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Hong_Kong
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-false}
      DATA_DIR: ${DATA_DIR:-/app/data}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      SERVER_STORAGE_TYPE: ${SERVER_STORAGE_TYPE:-pgsql}
      SERVER_STORAGE_URL: ${SERVER_STORAGE_URL}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
      CF_REFRESH_INTERVAL: ${CF_REFRESH_INTERVAL:-600}
      CF_TIMEOUT: ${CF_TIMEOUT:-60}
    command:
      - sh
      - -c
      - >
        granian --interface asgi --host "$${SERVER_HOST:-0.0.0.0}"
        --port "$${SERVER_PORT:-8000}" --workers "$${SERVER_WORKERS:-1}" main:app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grok2api
      - apinetwork

  postgres:
    container_name: grok2api-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: grok
      POSTGRES_PASSWORD: grokpass
      POSTGRES_DB: grok2api
      PGDATA: /var/lib/postgresql/data/data
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok -d grok2api"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - grok2api

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      TZ: Asia/Hong_Kong
      LOG_LEVEL: info
    restart: unless-stopped
    networks:
      - grok2api

networks:
  grok2api:
    name: grok2api
  apinetwork:
    name: apinetwork
